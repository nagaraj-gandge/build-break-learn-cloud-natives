
title: "My Portfolio"
description: "A modern portfolio built with Jekyll for GitHub Pages."
url: "https://example.github.io"
baseurl: ""
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Optional: set timezone for correct date handling
timezone: Asia/Kolkata
